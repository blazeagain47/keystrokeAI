[alembic]
script_location = backend/alembic
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is intentionally omitted here — backend/alembic/env.py reads
# the real connection string from the DATABASE_URL environment variable so
# migrations always target whatever database the app itself is configured
# to use (never hardcode a DB URL in source control).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
